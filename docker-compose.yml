services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ligilo}
      POSTGRES_USER: ${POSTGRES_USER:-ligilo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ligilo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  django:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
